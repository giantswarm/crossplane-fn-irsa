name: Update Function Version on Release PR

on:
  pull_request:
    types: [opened, synchronize]

permissions: {}

jobs:
  update-version:
    if: startsWith(github.event.pull_request.title, 'Release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from PR title
        id: version
        run: |
          VERSION=$(echo "${{ github.event.pull_request.title }}" | grep -oP 'v\d+\.\d+\.\d+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.TAYLORBOT_GITHUB_ACTION }}

      - name: Update function.yaml version
        run: |
          sed -i "s|package: gsoci.azurecr.io/giantswarm/crossplane-fn-irsa:.*|package: gsoci.azurecr.io/giantswarm/crossplane-fn-irsa:${{ steps.version.outputs.version }}|" api/composition/function.yaml

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "taylorbot"
          git config user.email "dev@giantswarm.io"
          git add api/composition/function.yaml
          git commit -m "Update function package version to ${{ steps.version.outputs.version }}"
          git push
